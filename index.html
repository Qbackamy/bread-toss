<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bread Toss — Office Discus Championship</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; font-family:'Trebuchet MS', 'Comic Sans MS', sans-serif; background:#7ec8f2; }
  #game { position:absolute; inset:0; width:100%; height:100%; display:block; }

  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
            justify-content:center; text-align:center; z-index:10; padding:20px; }
  .screen.active { display:flex; }

  h1.title { font-size:min(11vw,84px); color:#fff; letter-spacing:2px;
             text-shadow:0 5px 0 #d97b29, 0 9px 18px rgba(0,0,0,.35); transform:rotate(-2deg); }
  .subtitle { font-size:min(4.5vw,26px); color:#fff8e7; text-shadow:0 2px 6px rgba(0,0,0,.4);
              margin-top:8px; font-weight:bold; }
  .best { margin-top:18px; background:rgba(255,255,255,.9); color:#7a4a12; padding:8px 20px;
          border-radius:999px; font-weight:bold; font-size:16px; box-shadow:0 3px 10px rgba(0,0,0,.2); }

  .bigbtn { margin-top:30px; font-family:inherit; font-size:min(7vw,34px); font-weight:bold; color:#fff;
            background:linear-gradient(#ff9d3c,#f2711c); border:4px solid #fff; border-radius:20px;
            padding:16px 60px; cursor:pointer; box-shadow:0 8px 0 #b3540f, 0 12px 24px rgba(0,0,0,.3);
            transition:transform .08s; letter-spacing:1px; }
  .bigbtn:hover { transform:scale(1.05) rotate(-1deg); }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #b3540f; }
  .bigbtn:disabled { opacity:.6; cursor:wait; transform:none; }

  .prompt { font-size:min(8vw,52px); color:#fff; font-weight:bold;
            text-shadow:0 4px 0 #2a7f3f, 0 8px 16px rgba(0,0,0,.35); margin-bottom:24px; }
  .subprompt { font-size:min(4vw,22px); color:#fff; text-shadow:0 2px 5px rgba(0,0,0,.4); margin-bottom:20px; }

  .cards { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:960px; }
  .card { background:#fffdf5; border:4px solid #6b3f14; border-radius:18px; padding:14px 10px 12px;
          width:180px; cursor:pointer; transition:transform .1s, box-shadow .1s;
          box-shadow:0 6px 0 #6b3f14; position:relative; }
  .card:hover:not(.done) { transform:translateY(-6px) rotate(-1.5deg); box-shadow:0 12px 0 #6b3f14; }
  .card.done { opacity:.4; filter:grayscale(1); cursor:default; }
  .card img.avatar { height:150px; max-width:150px; object-fit:contain;
                     filter:drop-shadow(0 6px 6px rgba(0,0,0,.25)); }
  .card .cname { font-size:22px; font-weight:bold; color:#4a2c0a; }
  .card .ctag { font-size:12px; color:#8a6a3f; margin-top:4px; min-height:30px; }
  .card .cdist { position:absolute; top:-14px; right:-10px; background:#2a7f3f; color:#fff;
                 border:3px solid #fff; border-radius:999px; padding:4px 10px; font-weight:bold;
                 font-size:14px; transform:rotate(6deg); }

  .breadcard { width:250px; padding:22px 14px; }
  .breadcard img.bimg { height:90px; max-width:210px; object-fit:contain;
                        filter:drop-shadow(0 6px 6px rgba(0,0,0,.3)); }
  .breadcard .cname { font-size:26px; }
  .breadcard .ctag { font-size:14px; min-height:40px; }

  #resultsBox { background:rgba(255,253,245,.96); border:5px solid #6b3f14; border-radius:24px;
                padding:26px 34px; max-width:640px; width:92%; box-shadow:0 10px 0 #6b3f14, 0 20px 40px rgba(0,0,0,.3); }
  #resultsBox h2 { color:#4a2c0a; font-size:min(8vw,40px); transform:rotate(-1deg); margin-bottom:14px; }
  table.lb { width:100%; border-collapse:collapse; font-size:17px; color:#4a2c0a; }
  table.lb td { padding:7px 6px; border-bottom:2px dashed #d9c9a8; text-align:left; }
  table.lb tr:first-child { font-size:20px; font-weight:bold; background:#fff3c9; }
  table.lb td.dist { text-align:right; font-weight:bold; white-space:nowrap; }
  .awards { display:flex; gap:12px; justify-content:center; margin:16px 0 6px; flex-wrap:wrap; }
  .award { background:#ffe9a8; border:3px solid #d9a520; border-radius:14px; padding:10px 16px;
           font-weight:bold; color:#7a4a12; font-size:15px; transform:rotate(-1deg); }
  .award:last-child { transform:rotate(1.5deg); }
  #commentary { font-style:italic; color:#7a5a2f; margin-top:10px; font-size:16px; }

  #hud { position:absolute; top:0; left:0; right:0; z-index:5; display:none;
         justify-content:center; padding-top:14px; pointer-events:none; }
  #hud.active { display:flex; }
  #windBox { background:rgba(255,255,255,.92); border-radius:999px; padding:8px 22px; font-weight:bold;
             color:#33506b; font-size:18px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  #instruction { position:absolute; bottom:120px; left:0; right:0; text-align:center; z-index:5;
                 color:#fff; font-size:min(5vw,26px); font-weight:bold; display:none;
                 text-shadow:0 3px 0 rgba(0,0,0,.35); pointer-events:none; }
  #instruction.active { display:block; }
  #flightline { position:absolute; top:70px; left:0; right:0; text-align:center; z-index:5;
                color:#fff; font-size:min(4.5vw,24px); font-weight:bold; font-style:italic;
                text-shadow:0 2px 8px rgba(0,0,0,.5); pointer-events:none; opacity:0; transition:opacity .3s; }

  #distBanner { position:absolute; top:26%; left:0; right:0; text-align:center; z-index:6; display:none;
                pointer-events:none; }
  #distBanner.active { display:block; }
  #distBanner .num { font-size:min(16vw,90px); font-weight:bold; color:#fff;
                     text-shadow:0 6px 0 #d97b29, 0 10px 24px rgba(0,0,0,.4); }
  #distBanner .lbl { font-size:min(5vw,26px); color:#fff8e7; font-weight:bold; text-shadow:0 2px 8px rgba(0,0,0,.5); }

  #credit { position:absolute; bottom:10px; left:0; right:0; z-index:20; display:flex;
            align-items:center; justify-content:center; gap:10px; pointer-events:none; }
  #credit .ring { width:56px; height:56px; border-radius:50%; border:3px solid #fff;
                  box-shadow:0 3px 10px rgba(0,0,0,.35); overflow:hidden; background:#ffd9a8; flex:0 0 auto; }
  #credit .ring img { width:100%; height:100%; object-fit:cover; }
  #credit .txt { color:#fff; font-weight:bold; font-size:14px; text-shadow:0 2px 5px rgba(0,0,0,.5);
                 background:rgba(0,0,0,.25); padding:5px 14px; border-radius:999px; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud"><div id="windBox"></div></div>
<div id="instruction"></div>
<div id="flightline"></div>
<div id="distBanner"><div class="num"></div><div class="lbl"></div></div>

<div id="titleScreen" class="screen active">
  <h1 class="title">🥖 BREAD TOSS 🫓</h1>
  <div class="subtitle">Office Discus Championship</div>
  <button class="bigbtn" id="playBtn" disabled>WARMING THE OVENS…</button>
  <div class="best" id="bestLine" style="display:none"></div>
</div>

<div id="throwerScreen" class="screen">
  <div class="prompt">THROWER UP!</div>
  <div class="subprompt">Who's stepping onto the field?</div>
  <div class="cards" id="playerCards"></div>
</div>

<div id="breadScreen" class="screen">
  <div class="prompt" id="breadPrompt">Choose your weapon</div>
  <div class="cards">
    <div class="card breadcard" id="pickBaguette">
      <img class="bimg" src="assets/bread-baguette.png" alt="Baguette">
      <div class="cname">Baguette</div>
      <div class="ctag">Fast &amp; straight. Punishes bad angles without mercy.</div>
    </div>
    <div class="card breadcard" id="pickNaan">
      <img class="bimg" src="assets/bread-naan.png" alt="Naan">
      <div class="cname">Naan</div>
      <div class="ctag">Floaty &amp; chaotic. Might glide gloriously. Might flop.</div>
    </div>
  </div>
</div>

<div id="resultsScreen" class="screen">
  <div id="resultsBox">
    <h2>🏆 FINAL RESULTS 🏆</h2>
    <table class="lb" id="lbTable"></table>
    <div class="awards">
      <div class="award" id="awardHuman"></div>
      <div class="award" id="awardBread"></div>
    </div>
    <div id="commentary"></div>
    <button class="bigbtn" id="againBtn" style="font-size:24px; padding:12px 40px; margin-top:18px;">PLAY AGAIN</button>
  </div>
</div>

<div id="credit">
  <div class="ring"><img src="assets/amy.png" alt="Amy"></div>
  <div class="txt">Brought to you by Fable 5</div>
</div>

<script>
'use strict';
/* ============================== SETUP ============================== */
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
let W = 0, H = 0;
function resize(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
addEventListener('resize', resize); resize();

const $ = id => document.getElementById(id);
const screens = { title:$('titleScreen'), thrower:$('throwerScreen'), bread:$('breadScreen'), results:$('resultsScreen') };
function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  if(name) screens[name].classList.add('active');
}

const rand = (a,b)=>a+Math.random()*(b-a);
const pick = arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

/* ============================== ASSETS ============================== */
const CHAR_IDS = ['luca','nick','massimo','doug'];
const POSES = ['idle','windup-baguette','windup-naan','throw','celebrate','sad'];
const IMG = {};
function loadAssets(done){
  const names = [];
  CHAR_IDS.forEach(c=>POSES.forEach(p=>names.push(`${c}-${p}`)));
  names.push('bread-baguette','bread-naan','amy');
  const flats = ['stadium','grass'];
  let remaining = names.length + flats.length;
  const dec = ()=>{ if(--remaining===0) done(); };
  names.forEach(n=>{
    const im = new Image();
    im.onload = dec; im.onerror = dec;
    im.src = `assets/${n}.png`;
    IMG[n] = im;
  });
  flats.forEach(n=>{
    const im = new Image();
    im.onload = dec; im.onerror = dec;
    im.src = `assets/${n}.jpg`;
    IMG[n] = im;
  });
}
const ok = im => im && im.complete && im.naturalWidth > 0;

/* ============================== AUDIO ============================== */
let AC = null, murmurGain = null;
function audio(){ if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); return AC; }
function noiseBuf(ac, secs){
  const b = ac.createBuffer(1, ac.sampleRate*secs, ac.sampleRate);
  const d = b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  return b;
}
function startMurmur(){ // continuous stadium ambience
  if(murmurGain) return;
  const ac = audio();
  const src = ac.createBufferSource(); src.buffer = noiseBuf(ac,3); src.loop = true;
  const f = ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=420; f.Q.value=.4;
  murmurGain = ac.createGain(); murmurGain.gain.value = .035;
  src.connect(f).connect(murmurGain).connect(ac.destination); src.start();
}
function murmurSwell(level, secs){
  if(!murmurGain) return;
  const t = AC.currentTime;
  murmurGain.gain.cancelScheduledValues(t);
  murmurGain.gain.setTargetAtTime(level, t, .3);
  murmurGain.gain.setTargetAtTime(.035, t + secs, 1.2);
}
function sfxWhoosh(){
  const ac = audio(), t = ac.currentTime;
  const src = ac.createBufferSource(); src.buffer = noiseBuf(ac,.6);
  const f = ac.createBiquadFilter(); f.type='bandpass'; f.Q.value=1.2;
  f.frequency.setValueAtTime(300,t); f.frequency.exponentialRampToValueAtTime(2400,t+.35);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(.5,t+.12); g.gain.exponentialRampToValueAtTime(.001,t+.55);
  src.connect(f).connect(g).connect(ac.destination); src.start(t);
}
function sfxThud(){
  const ac = audio(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(45,t+.15);
  const g = ac.createGain(); g.gain.setValueAtTime(.7,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+.25);
  const src = ac.createBufferSource(); src.buffer = noiseBuf(ac,.08);
  const f = ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=2000;
  const g2 = ac.createGain(); g2.gain.setValueAtTime(.25,t); g2.gain.exponentialRampToValueAtTime(.001,t+.08);
  src.connect(f).connect(g2).connect(ac.destination); src.start(t);
}
function sfxSplat(){
  const ac = audio(), t = ac.currentTime;
  const src = ac.createBufferSource(); src.buffer = noiseBuf(ac,.3);
  const f = ac.createBiquadFilter(); f.type='lowpass';
  f.frequency.setValueAtTime(900,t); f.frequency.exponentialRampToValueAtTime(120,t+.25);
  const g = ac.createGain(); g.gain.setValueAtTime(.65,t); g.gain.exponentialRampToValueAtTime(.001,t+.3);
  src.connect(f).connect(g).connect(ac.destination); src.start(t);
  const o = ac.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(60,t+.18);
  const g2 = ac.createGain(); g2.gain.setValueAtTime(.3,t); g2.gain.exponentialRampToValueAtTime(.001,t+.2);
  o.connect(g2).connect(ac.destination); o.start(t); o.stop(t+.22);
}
function sfxCheer(){
  const ac = audio(), t = ac.currentTime;
  murmurSwell(.22, 1.4);
  const src = ac.createBufferSource(); src.buffer = noiseBuf(ac,1.6);
  const f = ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=.6;
  const g = ac.createGain();
  g.gain.setValueAtTime(.001,t); g.gain.exponentialRampToValueAtTime(.4,t+.25);
  g.gain.setValueAtTime(.4,t+.8); g.gain.exponentialRampToValueAtTime(.001,t+1.6);
  src.connect(f).connect(g).connect(ac.destination); src.start(t);
  for(let i=0;i<6;i++){
    const o = ac.createOscillator(); o.type='sine';
    const st = t + rand(.1,.9);
    o.frequency.setValueAtTime(rand(1200,2000),st); o.frequency.exponentialRampToValueAtTime(rand(1800,2600),st+.15);
    const og = ac.createGain(); og.gain.setValueAtTime(.06,st); og.gain.exponentialRampToValueAtTime(.001,st+.2);
    o.connect(og).connect(ac.destination); o.start(st); o.stop(st+.25);
  }
}
function sfxCountry(){
  const ac = audio(), t = ac.currentTime;
  const slides = [[196,246.9,0],[246.9,293.7,.18],[293.7,392,.36],[392,370,.62]];
  slides.forEach(([f1,f2,dt])=>{
    const o = ac.createOscillator(); o.type='triangle';
    const st = t+dt;
    o.frequency.setValueAtTime(f1,st); o.frequency.exponentialRampToValueAtTime(f2,st+.16);
    const lfo = ac.createOscillator(); lfo.frequency.value=6;
    const lg = ac.createGain(); lg.gain.value=5;
    lfo.connect(lg).connect(o.frequency); lfo.start(st); lfo.stop(st+.4);
    const g = ac.createGain(); g.gain.setValueAtTime(.001,st);
    g.gain.exponentialRampToValueAtTime(.22,st+.03); g.gain.exponentialRampToValueAtTime(.001,st+.4);
    o.connect(g).connect(ac.destination); o.start(st); o.stop(st+.45);
  });
  [392,493.9,587.3].forEach(f=>{
    const o = ac.createOscillator(); o.type='sawtooth';
    const st = t+.85;
    o.frequency.value=f;
    const flt = ac.createBiquadFilter(); flt.type='lowpass'; flt.frequency.setValueAtTime(2200,st);
    flt.frequency.exponentialRampToValueAtTime(500,st+.5);
    const g = ac.createGain(); g.gain.setValueAtTime(.08,st); g.gain.exponentialRampToValueAtTime(.001,st+.55);
    o.connect(flt).connect(g).connect(ac.destination); o.start(st); o.stop(st+.6);
  });
}
function sfxTick(freq){
  const ac = audio(), t = ac.currentTime;
  const o = ac.createOscillator(); o.type='square'; o.frequency.value=freq||600;
  const g = ac.createGain(); g.gain.setValueAtTime(.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.06);
  o.connect(g).connect(ac.destination); o.start(t); o.stop(t+.07);
}

/* ============================== CHARACTERS ============================== */
const CHARACTERS = [
  { id:'luca', name:'Luca', tag:'Tall, skinny, devoted to Jeremy Clarkson.', hpx:225 },
  { id:'nick', name:'Nick', tag:'Elbow ventilation for maximum aerodynamics.', hpx:190 },
  { id:'massimo', name:'Massimo', tag:'Business up top. Track & field down below.', hpx:205 },
  { id:'doug', name:'Doug', tag:'The new guy. Loves country music. Yeehaw.', hpx:195 },
];

/* Draw character sprite anchored at feet, with light procedural motion on top. */
function drawCharSprite(c, pose, t, feetX, feetY){
  let file = pose;
  if(pose==='windup') file = 'windup-' + (G.bread||'baguette');
  const img = IMG[`${c.id}-${file}`];
  if(!ok(img)) return;
  let dy = 0, rot = 0, sy = 1;
  if(pose==='idle'){ dy = Math.sin(t*2.2)*2; rot = Math.sin(t*1.1)*.015; }
  if(pose==='windup'){ rot = -.02 + Math.sin(t*9)*.02; }
  if(pose==='celebrate'){ dy = -Math.abs(Math.sin(t*6.5))*16; rot = Math.sin(t*6.5)*.04; }
  if(pose==='sad'){ dy = 2; sy = .97; rot = Math.sin(t*.9)*.01; }
  const h = c.hpx * Z, w = h * img.width / img.height;
  ctx.save();
  ctx.translate(feetX, feetY + dy*Z);
  ctx.rotate(rot);
  // soft contact shadow
  ctx.fillStyle = 'rgba(0,60,0,.25)';
  ctx.beginPath(); ctx.ellipse(0, 2, w*.32, 6*Z, 0, 0, 7); ctx.fill();
  ctx.scale(1, sy);
  ctx.drawImage(img, -w/2, -h, w, h);
  ctx.restore();
}

/* ============================== BREADS ============================== */
function drawBread(type, x, y, rot, opts){
  opts = opts || {};
  const img = IMG['bread-'+type];
  if(!ok(img)) return;
  const len = (type==='baguette' ? 78 : 62) * Z * (opts.scale||1);
  const w = len, h = len * img.height / img.width;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  if(opts.alpha !== undefined) ctx.globalAlpha = opts.alpha;
  // naan flutters like cloth: ripple its vertical scale
  const sy = type==='naan' ? (.8 + Math.sin(opts.flutter||0)*.22) : 1;
  ctx.scale(1, sy*(opts.squash||1));
  ctx.drawImage(img, -w/2, -h/2, w, h);
  ctx.restore();
}

/* ============================== WORLD RENDER ============================== */
const GROUND_FRAC = .82;
let camX = -4;           // metres (smoothed)
let camTarget = -4;
let Z = 1, zTarget = 1;  // dynamic zoom
let shake = 0;
const PXM = 11;
const THROW_X = 3;
const FOUL = THROW_X + 1;
// crop band of the stadium image used as the grandstand strip (fractions of image height)
const STAD_TOP = .20, STAD_BOT = .87;

function groundY(){ return H * GROUND_FRAC; }
function worldToScreen(mx, my){ return [ (mx - camX) * PXM * Z, groundY() - my * PXM * Z ]; }

const clouds = Array.from({length:14},(_,i)=>({ x: i*22 + rand(0,14), y: rand(.04,.26), s: rand(.7,1.5), v: rand(2,6) }));

function drawWorld(t, excite){
  const sx = (Math.random()-.5)*shake, sy = (Math.random()-.5)*shake;
  ctx.save(); ctx.translate(sx, sy);
  const gy = groundY();
  // sky
  const sky = ctx.createLinearGradient(0,0,0,gy);
  sky.addColorStop(0,'#4fb2ee'); sky.addColorStop(1,'#c8e9fb');
  ctx.fillStyle = sky; ctx.fillRect(-10,-10,W+20,gy+20);
  // sun with glow
  const glow = ctx.createRadialGradient(W*.85, H*.11, 10, W*.85, H*.11, 90);
  glow.addColorStop(0,'rgba(255,236,170,.95)'); glow.addColorStop(.4,'rgba(255,226,138,.55)'); glow.addColorStop(1,'rgba(255,226,138,0)');
  ctx.fillStyle = glow; ctx.fillRect(W*.85-90, H*.11-90, 180, 180);
  // clouds (parallax)
  ctx.fillStyle = 'rgba(255,255,255,.92)';
  clouds.forEach(c=>{
    const cxp = ((c.x - camX*.25 + t*c.v*.05) % 300 + 300) % 300 * PXM - 50;
    const cyp = c.y * H;
    ctx.beginPath();
    ctx.arc(cxp, cyp, 18*c.s, 0, 7); ctx.arc(cxp+20*c.s, cyp-6*c.s, 14*c.s, 0, 7); ctx.arc(cxp+38*c.s, cyp, 15*c.s, 0, 7);
    ctx.fill();
  });
  // grandstand strip from the stadium render, mirror-tiled, with parallax
  const stad = IMG['stadium'];
  if(ok(stad)){
    const bandH = Math.min(H*.30, 240);
    const srcY = stad.naturalHeight*STAD_TOP, srcH = stad.naturalHeight*(STAD_BOT-STAD_TOP);
    const tileW = bandH * (stad.naturalWidth/srcH);
    const jig = excite ? Math.sin(t*11)*2 : 0;
    let off = (-(camX*PXM*Z*.45)) % (tileW*2);
    if(off > 0) off -= tileW*2;
    for(let x = off; x < W+tileW; x += tileW){
      const k = Math.round((x-off)/tileW);
      ctx.save();
      if(k%2===1){ ctx.translate(x+tileW/2, 0); ctx.scale(-1,1); ctx.translate(-(x+tileW/2), 0); }
      ctx.drawImage(stad, 0, srcY, stad.naturalWidth, srcH, x, gy-bandH+jig, tileW, bandH);
      ctx.restore();
    }
    // atmospheric haze between stand and field
    const haze = ctx.createLinearGradient(0, gy-bandH, 0, gy);
    haze.addColorStop(0,'rgba(200,233,251,.35)'); haze.addColorStop(1,'rgba(200,233,251,0)');
    ctx.fillStyle = haze; ctx.fillRect(-10, gy-bandH, W+20, bandH);
  }
  // grass: photographic texture scrolling with the world
  const grass = IMG['grass'];
  if(ok(grass)){
    const gh = H-gy+10;
    const gw = gh * grass.naturalWidth/grass.naturalHeight;
    let off = (-(camX*PXM*Z)) % gw;
    if(off > 0) off -= gw;
    for(let x = off; x < W+gw; x += gw) ctx.drawImage(grass, x, gy, gw+1, gh);
    // depth shading + mow stripes
    const shade = ctx.createLinearGradient(0,gy,0,H);
    shade.addColorStop(0,'rgba(255,255,255,.14)'); shade.addColorStop(1,'rgba(0,40,0,.28)');
    ctx.fillStyle = shade; ctx.fillRect(-10,gy,W+20,gh);
    for(let m = Math.floor(camX/10)*10; m < camX + W/(PXM*Z) + 10; m += 10){
      const [px] = worldToScreen(m,0);
      ctx.fillStyle = (m/10)%2===0 ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.06)';
      ctx.fillRect(px, gy, 10*PXM*Z, gh);
    }
  } else {
    ctx.fillStyle = '#4ea63d'; ctx.fillRect(-10, gy, W+20, H-gy+10);
  }
  // distance markers every 10m, measured from the foul line
  ctx.textAlign = 'center';
  for(let m = 0; m < camX + W/(PXM*Z) + 20; m += 10){
    const [px] = worldToScreen(m + FOUL, 0);
    if(px < -40 || px > W+40) continue;
    ctx.strokeStyle = 'rgba(255,255,255,.85)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px, gy); ctx.lineTo(px, gy+14); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(15*Math.max(.8,Z))}px Trebuchet MS`;
    ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=3;
    ctx.fillText(m+'m', px, gy+32);
    ctx.shadowBlur=0;
  }
  // foul line
  const [fx] = worldToScreen(FOUL, 0);
  ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(fx, gy); ctx.lineTo(fx, H); ctx.stroke();
  ctx.restore();
}

/* ============================== GAME STATE ============================== */
const G = {
  state: 'title',
  throwsDone: [],
  current: null,
  bread: null,
  wind: 0, gust: 0,
  angle: 40, angleDir: 1,
  power: 0, powerDir: 1,
  lockedAngle: 0, lockedPower: 0, wild: false,
  proj: null,
  trail: [],
  rest: null,           // settled bread after landing
  reactTimer: 0,
  bestEver: null,
  time: 0,
  dust: [],
  charT: 0,
  flightLineShown: false,
  lastRec: null,
};

const FLIGHT_LINES = [
  "It's bread. It's airborne. It's beautiful.",
  "The crowd holds its breath. The bread does not.",
  "Somewhere, a baker weeps with pride.",
  "That's carbohydrate excellence, folks.",
  "Physics called. It's ignoring the call.",
  "Majestic. Utterly pointless, but majestic.",
  "This is why we can't book the good meeting room.",
];

function makeCommentary(sorted, breadAward){
  const w = sorted[0], l = sorted[sorted.length-1];
  const lines = [
    `${w.char.name} is unstoppable. The ${breadAward} defies all known physics.`,
    `${w.char.name} throws bread like it owes them money. ${l.char.name}... does not.`,
    `Scouts from the Bakery Olympics have been notified about ${w.char.name}.`,
    `${l.char.name} insists the wind was "personal". The ${breadAward} remains superior.`,
    `An emotional day for ${w.char.name}, and for bread as a concept.`,
  ];
  if(l.dist < 10) lines.push(`${l.char.name}'s throw has been classified as "a drop".`);
  if(w.wild) lines.push(`${w.char.name} won with a WILD throw. Nobody is more surprised than ${w.char.name}.`);
  return pick(lines);
}

/* ============================== UI WIRING ============================== */
const instruction = $('instruction'), hud = $('hud'), windBox = $('windBox');
const distBanner = $('distBanner'), flightline = $('flightline');

function buildPlayerCards(){
  const wrap = $('playerCards'); wrap.innerHTML = '';
  CHARACTERS.forEach(c=>{
    const done = G.throwsDone.find(th=>th.char.id===c.id);
    const card = document.createElement('div');
    card.className = 'card' + (done?' done':'');
    const av = document.createElement('img');
    av.className = 'avatar'; av.src = `assets/${c.id}-idle.png`; av.alt = c.name;
    card.appendChild(av);
    const nm = document.createElement('div'); nm.className='cname'; nm.textContent = c.name; card.appendChild(nm);
    const tg = document.createElement('div'); tg.className='ctag'; tg.textContent = c.tag; card.appendChild(tg);
    if(done){
      const d = document.createElement('div'); d.className='cdist';
      d.textContent = done.dist.toFixed(1)+'m'; card.appendChild(d);
    } else {
      card.addEventListener('click', ()=>{ audio(); selectPlayer(c); });
    }
    wrap.appendChild(card);
  });
}

function selectPlayer(c){
  G.current = c;
  $('breadPrompt').textContent = `${c.name}, choose your weapon`;
  G.state = 'bread';
  showScreen('bread');
}

function startThrow(bread){
  G.bread = bread;
  G.wind = Math.round(rand(-5,5)*10)/10;
  G.angle = 20; G.angleDir = 1;
  G.power = 0; G.powerDir = 1;
  G.wild = false;
  G.rest = null;
  G.trail = [];
  G.state = 'angle';
  G.charT = 0;
  showScreen(null);
  hud.classList.add('active');
  const dir = G.wind >= 0 ? '→' : '←';
  const desc = Math.abs(G.wind) < 1 ? 'calm' : Math.abs(G.wind) < 3 ? 'breezy' : 'HOWLING';
  windBox.textContent = `Wind ${dir} ${Math.abs(G.wind).toFixed(1)} m/s (${desc})`;
  instruction.textContent = 'CLICK / SPACE to lock the ANGLE';
  instruction.classList.add('active');
  camX = camTarget = -7;
  Z = zTarget = 1;
}

function lockInput(){
  if(G.state === 'angle'){
    G.lockedAngle = G.angle;
    G.power = 0; G.powerDir = 1;
    G.state = 'power';
    sfxTick(700);
    instruction.textContent = 'CLICK / SPACE to lock the POWER — avoid the red!';
  } else if(G.state === 'power'){
    G.lockedPower = G.power;
    sfxTick(500);
    launch();
  }
}
addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); if(G.state==='angle'||G.state==='power') lockInput(); }
});
cvs.addEventListener('pointerdown', ()=>{ if(G.state==='angle'||G.state==='power') lockInput(); });

/* ============================== PHYSICS ============================== */
function launch(){
  let angle = G.lockedAngle, power = G.lockedPower;
  G.wild = false;
  if(power > .92){
    G.wild = true;
    angle = clamp(angle + rand(-24,24), 8, 80);
    power = rand(.3,1.08);
  }
  const rad = angle * Math.PI/180;
  let v0, glide = 1;
  if(G.bread==='baguette'){
    v0 = 11 + power*20;
  } else {
    v0 = 9 + power*16;
    glide = rand(.55,1.65);
  }
  G.proj = {
    x: FOUL, y: 1.9,
    vx: Math.cos(rad)*v0, vy: Math.sin(rad)*v0,
    rot: -rad, rotV: 0,
    glide, flutter: 0,
    angleBadness: Math.max(0, Math.abs(angle - 37) - 9) / 30,
    steep: angle > 62,
    peaked: false, landed: false,
  };
  G.state = 'flight';
  G.flightLineShown = false;
  instruction.classList.remove('active');
  sfxWhoosh();
  murmurSwell(.12, 2.5);
  if(G.current.id==='doug') sfxCountry();
  if(G.wild){
    flightline.textContent = '💥 WILD THROW!!';
    flightline.style.opacity = 1;
    G.flightLineShown = true;
  }
}

function stepProjectile(p, dt){
  const gAccel = 9.81;
  let g = gAccel;
  // gusting wind: base wind modulated ±20% over the flight
  const wind = G.wind * (1 + Math.sin(G.time*1.7)*.2);
  const speed = Math.hypot(p.vx, p.vy);
  if(G.bread==='naan'){
    if(p.vy < 0) g *= clamp(1.15 - .5*p.glide, .28, 1.1);
    p.flutter += dt * (5 + speed*.35 + p.glide*3);   // flutters faster when moving fast
    p.vx += wind * .16 * dt * 9.81 / 5;
    p.vx += wind * .10 * dt;
    const drag = .012 + (p.glide < .7 ? .05 : 0) + .004*Math.abs(Math.sin(p.flutter));
    p.vx -= p.vx * drag * dt * 9;
    // banking wobble
    p.rot = Math.sin(p.flutter*.7)*.35 + Math.sin(p.flutter*.23)*.15;
  } else {
    p.vx += wind * .05 * dt;
    const drag = .003 + p.angleBadness * .028;
    p.vx -= p.vx * drag * dt * 9;
    p.vy -= p.vy * drag * dt * 4;
    // sweet-band aerodynamic carry: a well-thrown baguette knifes through the air
    if(p.angleBadness === 0 && p.vy < 0) g *= .9;
    if(p.steep && p.vy < 0) g *= 1.9;
    // spin rate follows airspeed — slows as it dies, tumbles violently on bad angles
    p.rotV = (5 + speed*.28) * (1 + p.angleBadness*2.2);
    p.rot += p.rotV * dt;
  }
  p.vy -= g * dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  if(p.vy < 0) p.peaked = true;
  if(p.peaked && p.y <= 0){
    p.y = 0; p.landed = true;
  }
}

function onLanding(p){
  const dist = Math.max(0, p.x - FOUL);
  const flop = (G.bread==='naan' && p.glide < .7) || (G.bread==='baguette' && p.angleBadness > .5);
  const rec = { char: G.current, bread: G.bread, dist, wild: G.wild, flop };
  G.throwsDone.push(rec);
  if(G.bread==='baguette') sfxThud(); else sfxSplat();
  const impactSpeed = Math.hypot(p.vx, p.vy);
  const steepImpact = Math.abs(p.vy) > Math.abs(p.vx)*1.1;
  if(flop || Math.abs(p.vy) > 13) shake = 14;
  if(dist > 55) sfxCheer();
  if(!G.bestEver || dist > G.bestEver.dist) G.bestEver = { name:G.current.name, bread:G.bread, dist };
  // settle behaviour: baguettes spear on steep fast hits, otherwise bounce flat; naan flops and slides
  G.rest = {
    type: G.bread, x: p.x, t: 0,
    mode: G.bread==='baguette' ? (steepImpact && impactSpeed > 13 ? 'spear' : 'bounce') : 'flop',
    fromRot: p.rot,
    slide: G.bread==='naan' ? clamp(p.vx*.06, 0, .8) : clamp(p.vx*.03, 0, .5),
  };
  // dust + grass tufts kicked up by impact
  for(let i=0;i<14;i++) G.dust.push({ x:p.x, y:0, vx:rand(-3,3)+p.vx*.1, vy:rand(1,5), r:rand(3,8), life:1, kind:'dust' });
  for(let i=0;i<10;i++) G.dust.push({ x:p.x, y:0, vx:rand(-4,4)+p.vx*.15, vy:rand(2,7), r:rand(1.5,3), life:1, kind:'grass' });
  distBanner.querySelector('.num').textContent = dist.toFixed(1)+'m';
  distBanner.querySelector('.lbl').textContent =
    G.wild ? `${G.current.name} — completely out of control` :
    flop ? `${G.current.name} — the ${G.bread} betrayed them` :
    dist > 55 ? `${G.current.name} — INCREDIBLE SCENES` :
    `${G.current.name} with the ${G.bread}`;
  distBanner.classList.add('active');
  G.state = 'reaction';
  G.reactTimer = 2.2;
  G.charT = 0;
  G.lastRec = rec;
  if(rec.dist > 45 && G.current.id==='doug') setTimeout(sfxCountry, 400);
}

function endReaction(){
  distBanner.classList.remove('active');
  hud.classList.remove('active');
  flightline.style.opacity = 0;
  camX = camTarget = -4;
  Z = zTarget = 1;
  if(G.throwsDone.length >= 4) showResults();
  else { G.state = 'thrower'; buildPlayerCards(); showScreen('thrower'); }
}

/* ============================== RESULTS ============================== */
function showResults(){
  G.state = 'results';
  const sorted = [...G.throwsDone].sort((a,b)=>b.dist-a.dist);
  const tbl = $('lbTable');
  tbl.innerHTML = sorted.map((r,i)=>
    `<tr><td>${['🥇','🥈','🥉','🍞'][i]}</td><td>${r.char.name}</td>`+
    `<td>${r.bread==='baguette'?'🥖 Baguette':'🫓 Naan'}${r.wild?' 💥':''}</td>`+
    `<td class="dist">${r.dist.toFixed(1)} m</td></tr>`).join('');
  $('awardHuman').textContent = `🏅 Furthest Human: ${sorted[0].char.name}`;
  const bag = G.throwsDone.filter(r=>r.bread==='baguette');
  const naan = G.throwsDone.filter(r=>r.bread==='naan');
  const avg = a => a.reduce((s,r)=>s+r.dist,0)/a.length;
  let breadWinner;
  if(!bag.length) breadWinner = 'naan';
  else if(!naan.length) breadWinner = 'baguette';
  else breadWinner = avg(bag) >= avg(naan) ? 'baguette' : 'naan';
  $('awardBread').textContent = `🥇 Superior Bread: ${breadWinner==='baguette'?'🥖 Baguette':'🫓 Naan'}`;
  $('commentary').textContent = '“' + makeCommentary(sorted, breadWinner) + '”';
  showScreen('results');
  sfxCheer();
}

$('playBtn').addEventListener('click', ()=>{
  audio(); startMurmur();
  G.throwsDone = [];
  G.state = 'thrower';
  buildPlayerCards();
  showScreen('thrower');
});
$('againBtn').addEventListener('click', ()=>{
  G.throwsDone = [];
  updateBestLine();
  G.state = 'thrower';
  buildPlayerCards();
  showScreen('thrower');
});
$('pickBaguette').addEventListener('click', ()=>startThrow('baguette'));
$('pickNaan').addEventListener('click', ()=>startThrow('naan'));

function updateBestLine(){
  const el = $('bestLine');
  if(G.bestEver){
    el.style.display = 'block';
    el.textContent = `🏆 All-time best: ${G.bestEver.name} — ${G.bestEver.dist.toFixed(1)}m (${G.bestEver.bread})`;
  }
}

loadAssets(()=>{
  const b = $('playBtn');
  b.disabled = false;
  b.textContent = 'PLAY';
});

/* ============================== MAIN LOOP ============================== */
let last = performance.now();
function frame(now){
  const dt = Math.min(.05, (now-last)/1000); last = now;
  G.time += dt; G.charT += dt;
  shake = Math.max(0, shake - dt*40);
  // smooth camera + zoom
  camX += (camTarget - camX) * Math.min(1, dt*6);
  Z += (zTarget - Z) * Math.min(1, dt*3);

  const excite = G.state==='flight' || (G.state==='reaction' && G.lastRec && G.lastRec.dist > 45);
  drawWorld(G.time, excite);

  if(G.state==='angle'){
    G.angle += G.angleDir * dt * 55;
    if(G.angle > 78){ G.angle = 78; G.angleDir = -1; }
    if(G.angle < 8){ G.angle = 8; G.angleDir = 1; }
    drawThrower('windup');
    drawAngleArc();
  } else if(G.state==='power'){
    G.power += G.powerDir * dt * 1.15;
    if(G.power > 1){ G.power = 1; G.powerDir = -1; }
    if(G.power < 0){ G.power = 0; G.powerDir = 1; }
    drawThrower('windup');
    drawAngleArc(true);
    drawPowerBar();
  } else if(G.state==='flight'){
    for(let i=0;i<3 && !G.proj.landed;i++) stepProjectile(G.proj, dt/3);
    const p = G.proj;
    camTarget = Math.max(-4, p.x - (W/(PXM*Z))*.45);
    // zoom out so high throws stay in frame
    const apexPx = p.y * PXM;
    zTarget = clamp((groundY()*.55) / Math.max(apexPx, groundY()*.55), .62, 1);
    drawThrower('throw');
    // motion-blur trail
    G.trail.push({ x:p.x, y:p.y, rot:p.rot, flutter:p.flutter });
    if(G.trail.length > 9) G.trail.shift();
    G.trail.forEach((tr,i)=>{
      if(i%2 || i===G.trail.length-1) return;
      const [tx,ty] = worldToScreen(tr.x, tr.y);
      drawBread(G.bread, tx, ty, tr.rot, { flutter:tr.flutter, alpha:.06 + i*.02, scale:.96 });
    });
    const [bx, by] = worldToScreen(p.x, p.y);
    drawBread(G.bread, bx, by, p.rot, { flutter:p.flutter });
    if(!G.flightLineShown && p.peaked){
      G.flightLineShown = true;
      if(Math.random() < .75){ flightline.textContent = '“' + pick(FLIGHT_LINES) + '”'; flightline.style.opacity = 1; }
    }
    if(p.landed) onLanding(p);
  } else if(G.state==='reaction'){
    const rec = G.lastRec;
    const good = rec.dist > 38 && !rec.flop;
    drawThrower(good ? 'celebrate' : 'sad');
    drawRestingBread(dt);
    G.reactTimer -= dt;
    if(G.reactTimer <= 0) endReaction();
  }

  // particles
  G.dust = G.dust.filter(d=>d.life>0);
  G.dust.forEach(d=>{
    d.x += d.vx*dt; d.y += d.vy*dt; d.vy -= 7*dt; d.life -= dt*1.3;
    const [px,py] = worldToScreen(d.x, Math.max(0,d.y));
    if(d.kind==='grass'){
      ctx.fillStyle = `rgba(70,140,50,${Math.max(0,d.life)*.9})`;
      ctx.fillRect(px-1.5, py-3, 3, 6);
    } else {
      ctx.fillStyle = `rgba(150,125,90,${Math.max(0,d.life)*.55})`;
      ctx.beginPath(); ctx.arc(px, py, d.r*(2-d.life), 0, 7); ctx.fill();
    }
  });

  requestAnimationFrame(frame);
}

function drawRestingBread(dt){
  const r = G.rest;
  if(!r) return;
  r.t += dt;
  const settle = Math.min(1, r.t/.45);
  const [gx, gy] = worldToScreen(r.x + r.slide*settle, 0);
  if(r.mode==='spear'){
    // stuck upright, quivering as it settles
    const quiver = (1-settle) * Math.sin(r.t*30) * .18;
    ctx.save();
    ctx.translate(gx, gy);
    ctx.beginPath(); ctx.rect(-80, -800, 160, 800); ctx.clip(); // hide the buried tip
    drawBread('baguette', 0, -14*Z, -1.18 + quiver, {});
    ctx.restore();
  } else if(r.mode==='bounce'){
    const hop = settle < .5 ? Math.sin(settle*Math.PI)* .5 : 0;
    const rot = r.fromRot + (Math.round(r.fromRot/Math.PI)*Math.PI - r.fromRot + .1) * settle;
    const [, hy] = worldToScreen(0, hop);
    drawBread('baguette', gx, hy - (groundY()-gy) - 5*Z, rot, {});
  } else { // naan flop
    const squash = 1 - settle*.5;
    drawBread('naan', gx, gy - 5*Z, 0, { flutter: r.t*3*(1-settle), squash });
  }
}

function drawThrower(pose){
  if(!G.current) return;
  const [px, py] = worldToScreen(THROW_X, 0);
  if(px < -220 || px > W+220) return;
  drawCharSprite(G.current, pose, G.charT, px, py);
}

function drawAngleArc(locked){
  const ang = locked ? G.lockedAngle : G.angle;
  const [ox, oy] = worldToScreen(FOUL, 1.9);
  ctx.save(); ctx.translate(ox, oy);
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 3; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.arc(0, 0, 90, -Math.PI*78/180, -Math.PI*8/180); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(80,220,110,.5)'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.arc(0, 0, 90, -Math.PI*46/180, -Math.PI*28/180); ctx.stroke();
  const rad = -ang * Math.PI/180;
  ctx.strokeStyle = locked ? '#ffd23c' : '#fff'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(rad)*105, Math.sin(rad)*105); ctx.stroke();
  ctx.fillStyle = locked ? '#ffd23c' : '#fff';
  ctx.font = 'bold 18px Trebuchet MS'; ctx.textAlign = 'left';
  ctx.fillText(Math.round(ang)+'°', Math.cos(rad)*118, Math.sin(rad)*118);
  ctx.restore();
}

function drawPowerBar(){
  const bw = Math.min(W*.6, 420), bh = 34;
  const bx = (W-bw)/2, by = H - 78;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  roundRect(ctx, bx-5, by-5, bw+10, bh+10, 12); ctx.fill();
  ctx.fillStyle = '#fff'; roundRect(ctx, bx, by, bw, bh, 8); ctx.fill();
  ctx.fillStyle = '#e8493b'; roundRect(ctx, bx + bw*.92, by, bw*.08, bh, 6); ctx.fill();
  const grad = ctx.createLinearGradient(bx,0,bx+bw,0);
  grad.addColorStop(0,'#7be04e'); grad.addColorStop(.7,'#ffd23c'); grad.addColorStop(.92,'#ff8a3c');
  ctx.fillStyle = grad;
  roundRect(ctx, bx, by, bw*clamp(G.power,0,1), bh, 8); ctx.fill();
  ctx.strokeStyle = '#4a2c0a'; ctx.lineWidth = 3;
  roundRect(ctx, bx, by, bw, bh, 8); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Trebuchet MS'; ctx.textAlign='center';
  ctx.fillText('POWER', bx+bw/2, by-12);
  ctx.restore();
}

function roundRect(cx2,x,y,w,h,r){
  cx2.beginPath();
  cx2.moveTo(x+r,y); cx2.arcTo(x+w,y,x+w,y+h,r); cx2.arcTo(x+w,y+h,x,y+h,r);
  cx2.arcTo(x,y+h,x,y,r); cx2.arcTo(x,y,x+w,y,r); cx2.closePath();
}

requestAnimationFrame(frame);
</script>
